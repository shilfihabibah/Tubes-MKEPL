name: CI/CD Pipeline Tugas Besar PL-SCD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Continuous Integration
  continuous-integration:
    name: Build Application (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4 
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Compile Maven Project
        run: mvn clean compile

  # 2. Continuous Testing
  continuous-testing:
    name: Run Unit Tests (CT)
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Unit Tests
        run: mvn test
        
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # 3. Continuous Inspection
  continuous-inspection:
    name: Code Quality Check (PMD)
    needs: continuous-testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Run PMD Inspection
        run: mvn pmd:pmd
        
      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/site/pmd.html

  # 4. Continuous Deployment
  continuous-deployment:
    name: Deploy to GitHub Packages (CD)
    needs: continuous-inspection
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17 dan Konfigurasi Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17' 
          distribution: 'temurin'
          cache: maven
          server-id: github 
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
