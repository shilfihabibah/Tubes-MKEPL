name: CI/CD Pipeline Tugas Besar PL-SCD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Continuous Integration
  continuous-integration:
    name: Build Application (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Compile Maven Project
        run: mvn clean compile

  # 2. Continuous Testing
     # 2. Continuous Testing
  continuous-testing:
    name: Run Unit Tests (CT)
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Unit Tests
        run: mvn test
        
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # 3. Continuous Inspection
  continuous-testing:
  name: Run Unit Tests (CT)
  needs: continuous-integration
  runs-on: ubuntu-latest

  steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Unit Tests
      run: mvn test

  # 4. Continuous Deployment
  continuous-deployment:
    name: Create GitHub Release (CD)
    needs: [continuous-testing, continuous-inspection]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      # 1. Setup Java Environment
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11' 
          distribution: 'temurin'
          cache: maven

      # 2. Build file .jar menggunakan Maven
      - name: Build JAR with Maven
        run: mvn clean package -DskipTests 

      # 3. Membuat GitHub Release dan mengunggah file .jar otomatis
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }} 
          name: Release v1.0.${{ github.run_number }}
          files: target/*.jar 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
